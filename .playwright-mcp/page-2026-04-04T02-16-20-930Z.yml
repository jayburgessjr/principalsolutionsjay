    - generic [ref=e190]: What Revuity Systems Proves
    - heading "Four Products Built Solo. Here's What That Actually Means." [level=2] [ref=e191]:
      - text: Four Products Built Solo.
      - emphasis [ref=e192]: Here's What That Actually Means.
    - paragraph [ref=e193]: Anyone can have ideas. Revuity Systems is proof that I execute them — across different markets, different users, and different technical challenges — without a team, a runway, or a safety net.
    - generic [ref=e194]:
      - generic [ref=e195]:
        - generic [ref=e196]: "01"
        - generic [ref=e197]: I Own Outcomes — Not Tasks
        - paragraph [ref=e198]:
          - text: There's no PM to escalate to. No engineering team to hand specs to. No designer to review my work.
          - strong [ref=e199]: I make every call and live with every result.
          - text: That's the accountability level I operate at — and it's exactly what "high autonomy, high accountability" means in practice.
      - generic [ref=e200]:
        - generic [ref=e201]: "02"
        - generic [ref=e202]: I Ship Fast Across Different Contexts
        - paragraph [ref=e203]:
          - text: WedData, CertPath, GameNight, and Box Office Beacon are not variations on one product — they're four completely different markets, user types, data models, and go-to-market approaches.
          - strong [ref=e204]: I don't need to be handed a context. I build one.
      - generic [ref=e205]:
