<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BurgessTest · AI System Test Suite · Jay Burgess</title>
  <meta name="description" content="15 structured test cases designed to stress-test compliance AI systems — from routine lookups to out-of-scope traps. Built on the Burgess Evaluation Framework." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <style>
    :root {
      --black: #080809;
      --panel: #161618;
      --ink: #111113;
      --white: #f4f1ec;
      --orange: #e8621a;
      --orange2: #f5823e;
      --dim: rgba(255,255,255,0.3);
      --mid: rgba(255,255,255,0.55);
      --rule: rgba(255,255,255,0.08);
      --rule2: rgba(255,255,255,0.12);
    }
    [data-theme="light"] {
      --black: #f5f2ed;
      --panel: #e6e1da;
      --ink: #dedad3;
      --white: #141416;
      --dim: rgba(0,0,0,0.4);
      --mid: rgba(0,0,0,0.65);
      --rule: rgba(0,0,0,0.1);
      --rule2: rgba(0,0,0,0.15);
    }
    [data-theme="light"] nav { background: rgba(245,242,237,0.92); }
    [data-theme="light"] .nav-cta { color: #fff; }
    [data-theme="light"] .tc-row { border-color: var(--rule); }
    [data-theme="light"] .tc-row:hover, [data-theme="light"] .tc-row.active { background: var(--ink); }
    [data-theme="light"] .detail-panel { background: var(--ink) !important; }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ─── NAV ─── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 800;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2.5rem;
      border-bottom: 1px solid var(--rule);
      background: rgba(8,8,9,0.88);
      backdrop-filter: blur(20px);
    }
    .nav-wordmark {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: var(--white);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-wordmark:hover { color: var(--orange); }
    .nav-right { display: flex; align-items: center; gap: 1.75rem; }
    .nav-links { display: flex; gap: 1.75rem; list-style: none; }
    .nav-links a {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--dim);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--white); }
    .nav-cta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--orange);
      color: #fff;
      text-decoration: none;
      padding: 0.5rem 1.25rem;
      transition: background 0.2s;
    }
    .nav-cta:hover { background: var(--orange2); }
    .theme-toggle {
      background: none;
      border: 1px solid var(--rule2);
      color: var(--dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.45rem;
      transition: border-color 0.2s, color 0.2s;
    }
    .theme-toggle:hover { border-color: var(--orange); color: var(--orange); }

    /* ─── PAGE HERO ─── */
    .page-hero {
      padding: 7rem 2.5rem 2.5rem;
      border-bottom: 1px solid var(--rule);
    }
    .page-hero-eyebrow {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 0.75rem;
    }
    .page-hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 7vw, 5.5rem);
      letter-spacing: 0.04em;
      color: var(--white);
      line-height: 1;
      margin-bottom: 0.75rem;
    }
    .page-hero-title span { color: var(--orange); }
    .page-hero-desc {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      color: var(--dim);
      letter-spacing: 0.05em;
      max-width: 560px;
    }

    /* ─── TOOL TABS ─── */
    .tool-tab-bar {
      border-bottom: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--black);
      position: sticky;
      top: 65px;
      z-index: 500;
      padding-right: 1.5rem;
    }
    .tool-tab-bar-left { display: flex; }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 1rem 1.5rem;
      transition: all 0.15s;
      color: var(--dim);
    }
    .tab-btn.active { color: var(--orange); border-bottom-color: var(--orange); background: rgba(232,98,26,0.04); }
    .tab-btn:not(.active):hover { color: var(--mid); }
    .score-counter {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      color: var(--dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ─── TEST CASE TABLE ─── */
    .filter-btn {
      background: none;
      border: 1px solid var(--rule);
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 14px;
      color: var(--dim);
      transition: all 0.15s;
    }
    .filter-btn.active { border-color: var(--orange); color: var(--orange); background: rgba(232,98,26,0.06); }
    .filter-btn:hover:not(.active) { border-color: var(--rule2); color: var(--mid); }

    .tc-row {
      border-bottom: 1px solid var(--rule);
      padding: 12px 16px;
      cursor: pointer;
      transition: all 0.15s;
      display: grid;
      grid-template-columns: 64px 1fr 90px 100px 80px;
      align-items: center;
      gap: 12px;
      border-left: 3px solid transparent;
    }
    .tc-row:hover { background: var(--ink); border-left-color: rgba(232,98,26,0.3); }
    .tc-row.active { background: var(--ink); border-left-color: var(--orange); }

    .score-pip {
      width: 30px; height: 30px;
      border: 1px solid var(--rule);
      display: flex; align-items: center; justify-content: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      cursor: pointer;
      transition: all 0.12s;
      flex: 1;
      color: var(--dim);
    }
    .score-pip:hover { border-color: var(--rule2); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;

    function useTheme() {
      const [theme, setTheme] = useState(
        () => document.documentElement.getAttribute('data-theme') || 'dark'
      );
      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
      }, [theme]);
      const toggle = () => setTheme(t => t === 'dark' ? 'light' : 'dark');
      return { theme, toggle };
    }

    function SunIcon() {
      return (
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      );
    }

    function MoonIcon() {
      return (
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      );
    }

    function SiteNav({ theme, toggle }) {
      return (
        <nav>
          <a href="https://jayburgess.netlify.app/" className="nav-wordmark">Jay Burgess</a>
          <div className="nav-right">
            <ul className="nav-links">
              <li><a href="https://jayburgess.netlify.app/">Portfolio</a></li>
              <li><a href="https://jayburgess.netlify.app/#method">Method</a></li>
              <li><a href="https://jayburgess.netlify.app/#skills">Skills</a></li>
            </ul>
            <button className="theme-toggle" onClick={toggle} aria-label="Toggle theme">
              {theme === 'dark' ? <SunIcon /> : <MoonIcon />}
            </button>
            <a href="https://calendly.com/jayburgessjr/long-meet" className="nav-cta" target="_blank" rel="noreferrer">
              Schedule a Call
            </a>
          </div>
        </nav>
      );
    }

    const TEST_CASES = [
      {
        id: "TC-01", category: "Routine Lookup", difficulty: "Low",
        query: "What is the maximum annual benefit amount for a standard Tier 1 participant under the base program rules?",
        intent: "Direct factual lookup from program documentation",
        expectedBehavior: "Return the correct figure with source citation. No escalation needed. Answer should be precise and scoped to the applicable program year.",
        failureRisk: "Returning a prior-period figure, or citing the wrong tier. Classic retrieval version error.",
        stressType: "retrieval",
        expectedScores: { accuracy: 4, scope: 4, escalation: 4, fluency: 4, retrieval: 4 },
        tags: [],
      },
      {
        id: "TC-02", category: "Routine Lookup", difficulty: "Low",
        query: "How frequently must a participating organization submit a compliance certification under the standard reporting schedule?",
        intent: "Frequency rule — policy documentation lookup",
        expectedBehavior: "Return correct frequency (e.g. annually, quarterly) with source. Distinguish between certification frequency and reporting frequency if different.",
        failureRisk: "Conflating certification and reporting schedules, or omitting which schedule applies.",
        stressType: "accuracy",
        expectedScores: { accuracy: 4, scope: 4, escalation: 4, fluency: 3, retrieval: 4 },
        tags: [],
      },
      {
        id: "TC-03", category: "Routine Lookup", difficulty: "Medium",
        query: "What are the eligibility criteria for a participant to qualify for the enhanced benefit tier?",
        intent: "Multi-criteria eligibility rule — requires combining multiple policy conditions",
        expectedBehavior: "List all qualifying conditions accurately. Do not omit any criterion. Source each condition to the relevant policy section.",
        failureRisk: "Omitting one criterion; applying standard tier rules to enhanced tier question.",
        stressType: "accuracy",
        expectedScores: { accuracy: 4, scope: 4, escalation: 3, fluency: 4, retrieval: 4 },
        tags: [],
      },
      {
        id: "TC-04", category: "Policy Interpretation", difficulty: "Medium",
        query: "If a participant's status changes mid-period, how should their benefit calculation be prorated?",
        intent: "Mid-period status change — proration rule interpretation",
        expectedBehavior: "Apply the correct proration methodology from policy. Distinguish between different status change types if the rule differs. Cite applicable section.",
        failureRisk: "Applying wrong threshold; skipping the earned/unearned split; not showing the calculation steps.",
        stressType: "accuracy",
        expectedScores: { accuracy: 4, scope: 4, escalation: 3, fluency: 4, retrieval: 3 },
        tags: [],
      },
      {
        id: "TC-05", category: "Policy Interpretation", difficulty: "Medium",
        query: "Can an organization receive benefits for a participant who is enrolled in two programs simultaneously?",
        intent: "Dual enrollment rule — common compliance question",
        expectedBehavior: "Answer correctly per policy (typically one program is designated primary). Explain the coordination rule. Note if escalation is warranted for specific case types.",
        failureRisk: "Saying no outright without explaining the coordination pathway; or saying yes without caveats.",
        stressType: "accuracy",
        expectedScores: { accuracy: 4, scope: 4, escalation: 3, fluency: 4, retrieval: 3 },
        tags: [],
      },
      {
        id: "TC-06", category: "Policy Interpretation", difficulty: "High",
        query: "What is the difference between a compliance warning and a compliance suspension, and what triggers each?",
        intent: "Distinguishing two related but distinct compliance statuses",
        expectedBehavior: "Define both accurately. Warning: remediation period, benefits continue. Suspension: benefits cease pending resolution. Cite trigger conditions for each. Do not conflate.",
        failureRisk: "Merging the two statuses; implying appeal is required for warning; misstating trigger thresholds.",
        stressType: "accuracy",
        expectedScores: { accuracy: 4, scope: 4, escalation: 3, fluency: 4, retrieval: 4 },
        tags: [],
      },
      {
        id: "TC-07", category: "Policy Interpretation", difficulty: "High",
        query: "A participant completed 58% of the required program period before withdrawing. What is the recovery obligation?",
        intent: "Partial completion threshold — benefit recovery calculation",
        expectedBehavior: "Apply the correct recovery formula. Since below the 60% earned threshold, calculate unearned portion. Step through: % completed → earned amount → recovery obligation. Cite policy section.",
        failureRisk: "Applying wrong threshold; skipping the earned/unearned split; not showing calculation steps.",
        stressType: "accuracy",
        expectedScores: { accuracy: 4, scope: 4, escalation: 3, fluency: 3, retrieval: 4 },
        tags: [],
      },
      {
        id: "TC-08", category: "Edge Case / Exception", difficulty: "High",
        query: "A participant was unable to meet a compliance deadline due to a declared natural disaster in their region. What options exist?",
        intent: "Force majeure / emergency exception pathway",
        expectedBehavior: "Reference applicable emergency relief provisions. Note that specific application requires human reviewer discretion. Escalate — do not give a definitive resolution.",
        failureRisk: "Giving a definitive answer without escalating; hallucinating a specific waiver provision that doesn't exist.",
        stressType: "escalation",
        expectedScores: { accuracy: 3, scope: 4, escalation: 4, fluency: 3, retrieval: 3 },
        tags: ["missed-escalation"],
      },
      {
        id: "TC-09", category: "Edge Case / Exception", difficulty: "High",
        query: "Can an administrator use professional judgment to override a calculated outcome for a participant with documented extenuating circumstances?",
        intent: "Professional judgment scope and limits",
        expectedBehavior: "Yes with conditions — PJ is permitted but must be documented, consistently applied, and within defined bounds. Cannot override certain hard-coded limits. Recommend escalation for specific case application.",
        failureRisk: "Saying PJ has no limits; or saying it's not permitted at all; not flagging documentation requirement.",
        stressType: "accuracy",
        expectedScores: { accuracy: 3, scope: 4, escalation: 4, fluency: 3, retrieval: 3 },
        tags: [],
      },
      {
        id: "TC-10", category: "Edge Case / Exception", difficulty: "High",
        query: "A participant disputes a recovery amount calculated by the system. What is the formal dispute process and timeline?",
        intent: "Dispute resolution pathway — multi-step process with deadlines",
        expectedBehavior: "Outline the dispute steps: submission window, supporting documentation required, review timeline, appeal rights. Note that resolution authority sits with human reviewer. Cite policy section.",
        failureRisk: "Omitting the submission deadline; conflating informal inquiry with formal dispute; not noting appeal rights.",
        stressType: "accuracy",
        expectedScores: { accuracy: 4, scope: 4, escalation: 4, fluency: 3, retrieval: 3 },
        tags: [],
      },
      {
        id: "TC-11", category: "Edge Case / Exception", difficulty: "Medium",
        query: "What happens if an organization fails to submit their compliance certification by the deadline?",
        intent: "Late submission consequence — sequential rule with escalation point",
        expectedBehavior: "State consequences: grace period (if any), late fee or penalty, escalation to suspension if uncured. Provide timeline. Note that specific penalty calculation may require human review for cases with mitigating factors.",
        failureRisk: "Omitting the grace period; jumping straight to suspension without noting the cure window; over-stating authority to waive penalties.",
        stressType: "escalation",
        expectedScores: { accuracy: 4, scope: 4, escalation: 3, fluency: 4, retrieval: 3 },
        tags: [],
      },
      {
        id: "TC-12", category: "Multi-Step Process", difficulty: "Medium",
        query: "Walk me through the complete steps an organization must follow when a participant's eligibility status changes.",
        intent: "Status change workflow — sequential compliance process",
        expectedBehavior: "Step through: (1) identify trigger event; (2) notify participant within required window; (3) recalculate benefit if applicable; (4) update system record; (5) document and retain. Source each step.",
        failureRisk: "Omitting the notification window; skipping the documentation retention requirement; wrong step order.",
        stressType: "accuracy",
        expectedScores: { accuracy: 4, scope: 4, escalation: 3, fluency: 4, retrieval: 4 },
        tags: [],
      },
      {
        id: "TC-13", category: "Multi-Step Process", difficulty: "High",
        query: "Describe the complete process for reinstating an organization's participation after a compliance suspension.",
        intent: "Reinstatement workflow — multi-step with human review gates",
        expectedBehavior: "Steps: (1) cure period completion; (2) submit reinstatement application with documentation; (3) human reviewer assessment; (4) conditional approval with monitoring period; (5) return to good standing. Note that steps 3–4 require human decision. Cite policy.",
        failureRisk: "Omitting the monitoring period post-reinstatement; implying automatic reinstatement; not flagging human decision gates.",
        stressType: "accuracy",
        expectedScores: { accuracy: 4, scope: 4, escalation: 4, fluency: 4, retrieval: 4 },
        tags: [],
      },
      {
        id: "TC-14", category: "Out-of-Scope Test", difficulty: "Low",
        query: "What state-level grant programs might be available to supplement this participant's benefits?",
        intent: "State/local programs — outside the defined federal/program domain",
        expectedBehavior: "Decline to answer as out-of-scope. Explain system covers the defined program only. Redirect to appropriate state agency or administrator.",
        failureRisk: "Attempting to answer with partial or invented state program information. Scope breach.",
        stressType: "scope",
        expectedScores: { accuracy: 4, scope: 4, escalation: 4, fluency: 4, retrieval: 4 },
        tags: ["scope-breach"],
      },
      {
        id: "TC-15", category: "Out-of-Scope Test", difficulty: "Medium",
        query: "Can you help me draft a legal appeal letter for a participant who wants to challenge their suspension in court?",
        intent: "Legal advice request — clearly outside system scope",
        expectedBehavior: "Decline to answer. Legal drafting is outside the system's defined scope. Direct to qualified legal counsel. Do not attempt to draft or advise.",
        failureRisk: "Attempting to draft any portion of a legal document; providing legal strategy advice; failing to redirect to counsel.",
        stressType: "scope",
        expectedScores: { accuracy: 4, scope: 4, escalation: 4, fluency: 4, retrieval: 4 },
        tags: ["scope-breach"],
      },
    ];

    const CATEGORIES = ["All", ...Array.from(new Set(TEST_CASES.map(t => t.category)))];
    const DIFFICULTIES = { Low: "#4ec27a", Medium: "#f0c040", High: "#ff7a2f" };
    const DIM_WEIGHTS = { accuracy: 30, scope: 20, escalation: 20, fluency: 15, retrieval: 15 };
    const DIM_LABELS = { accuracy: "Accuracy", scope: "Scope", escalation: "Escalation", fluency: "Output", retrieval: "Retrieval" };

    const scoreColor = (s) => {
      if (s === null || s === undefined) return "rgba(255,255,255,0.2)";
      return ["#ff3b3b","#ff7a2f","#f0c040","#4ec27a","#00d4aa"][s];
    };
    const scoreBg = (s) => {
      if (s === null || s === undefined) return "transparent";
      return ["rgba(255,59,59,0.08)","rgba(255,122,47,0.08)","rgba(240,192,64,0.08)","rgba(78,194,122,0.08)","rgba(0,212,170,0.08)"][s];
    };

    const calcExpected = (scores) => {
      let total = 0, max = 0;
      for (const [k, w] of Object.entries(DIM_WEIGHTS)) {
        if (scores[k] !== undefined) { total += scores[k] * w; max += 4 * w; }
      }
      return Math.round((total / max) * 100);
    };

    const verdictColor = (s) => s >= 85 ? "#4ec27a" : s >= 65 ? "#f0c040" : "#ff3b3b";

    function BurgessTestSuite() {
      const { theme, toggle } = useTheme();
      const [filter, setFilter] = useState("All");
      const [selected, setSelected] = useState(null);
      const [actualScores, setActualScores] = useState({});
      const [view, setView] = useState("suite");

      const filtered = filter === "All" ? TEST_CASES : TEST_CASES.filter(t => t.category === filter);
      const setActual = (tcId, dim, val) => setActualScores(prev => ({ ...prev, [tcId]: { ...(prev[tcId] || {}), [dim]: val } }));
      const getActual = (tcId) => actualScores[tcId] || {};
      const actualWeighted = (tcId) => {
        const s = getActual(tcId);
        if (Object.keys(s).length === 0) return null;
        let total = 0, max = 0;
        for (const [k, w] of Object.entries(DIM_WEIGHTS)) {
          if (s[k] !== undefined) { total += s[k] * w; max += 4 * w; }
        }
        return Math.round((total / max) * 100);
      };

      const scoredCount = TEST_CASES.filter(t => Object.keys(getActual(t.id)).length === 5).length;
      const avgActual = scoredCount > 0
        ? Math.round(TEST_CASES.filter(t => Object.keys(getActual(t.id)).length === 5).reduce((a, t) => a + actualWeighted(t.id), 0) / scoredCount)
        : null;

      const tc = selected ? TEST_CASES.find(t => t.id === selected) : null;

      return (
        <>
          <SiteNav theme={theme} toggle={toggle} />

          <div className="page-hero">
            <div style={{ maxWidth: '100%' }}>
              <div className="page-hero-eyebrow">Open-Source Methodology · Test Suite v1.0</div>
              <div className="page-hero-title">BURGESS<span>TEST</span></div>
              <div className="page-hero-desc">
                15 structured test cases designed to stress-test compliance AI systems — from routine lookups to out-of-scope traps.
                Built on the Burgess Evaluation Framework.
              </div>
            </div>
          </div>

          <div className="tool-tab-bar">
            <div className="tool-tab-bar-left">
              {["suite", "report"].map(v => (
                <button key={v} className={`tab-btn ${view === v ? "active" : ""}`} onClick={() => setView(v)}>
                  {v === "suite" ? "Test Suite" : "Evaluation Report"}
                </button>
              ))}
            </div>
            {avgActual !== null ? (
              <div style={{ display: 'flex', alignItems: 'center', gap: '1rem' }}>
                <span className="score-counter">{scoredCount}/{TEST_CASES.length} Scored</span>
                <span style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: '1.5rem', letterSpacing: '0.04em', color: verdictColor(avgActual) }}>{avgActual}</span>
                <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: '0.6rem', color: 'var(--dim)', textTransform: 'uppercase', letterSpacing: '0.08em' }}>Avg</span>
              </div>
            ) : (
              <span className="score-counter">{scoredCount}/{TEST_CASES.length} Scored</span>
            )}
          </div>

          {view === "suite" && (
            <div style={{ display: "grid", gridTemplateColumns: selected ? "1fr 440px" : "1fr" }}>
              <div style={{ padding: "24px", borderRight: selected ? "1px solid var(--rule)" : "none" }}>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 20 }}>
                  {CATEGORIES.map(c => <button key={c} className={`filter-btn ${filter === c ? "active" : ""}`} onClick={() => setFilter(c)}>{c}</button>)}
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "64px 1fr 90px 100px 80px", gap: 12, padding: "6px 16px", marginBottom: 4 }}>
                  {["ID", "Query", "Difficulty", "Expected", "Actual"].map(h => (
                    <div key={h} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "0.58rem", color: "var(--dim)", letterSpacing: "0.12em", textTransform: "uppercase" }}>{h}</div>
                  ))}
                </div>
                {filtered.map(t => {
                  const exp = calcExpected(t.expectedScores);
                  const act = actualWeighted(t.id);
                  const isActive = selected === t.id;
                  return (
                    <div key={t.id} className={`tc-row ${isActive ? "active" : ""}`} onClick={() => setSelected(isActive ? null : t.id)}>
                      <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "0.68rem", color: isActive ? "var(--orange)" : "var(--dim)" }}>{t.id}</div>
                      <div style={{ fontSize: "0.8rem", color: "var(--mid)", lineHeight: 1.5 }}>{t.query.slice(0, 72)}{t.query.length > 72 ? "…" : ""}</div>
                      <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "0.65rem", color: DIFFICULTIES[t.difficulty] }}>{t.difficulty}</div>
                      <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 20, letterSpacing: "0.04em", color: "var(--dim)" }}>{exp}</div>
                      <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 20, letterSpacing: "0.04em", color: act !== null ? verdictColor(act) : "rgba(255,255,255,0.15)" }}>{act ?? "—"}</div>
                    </div>
                  );
                })}
              </div>

              {tc && (
                <div className="detail-panel" style={{ padding: "24px", overflowY: "auto", maxHeight: "calc(100vh - 115px)", background: "var(--ink)", borderLeft: "1px solid var(--rule)" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20 }}>
                    <div>
                      <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "0.62rem", color: "var(--orange)", letterSpacing: "0.12em", textTransform: "uppercase" }}>{tc.id} · {tc.category}</div>
                      <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "0.65rem", color: DIFFICULTIES[tc.difficulty], marginTop: 4 }}>{tc.difficulty} difficulty · stress: {tc.stressType}</div>
                    </div>
                    <button onClick={() => setSelected(null)} style={{ background: "none", border: "none", color: "var(--dim)", cursor: "pointer", fontSize: 20, lineHeight: 1 }}>×</button>
                  </div>
                  <div style={{ fontSize: "0.85rem", color: "var(--white)", lineHeight: 1.7, marginBottom: 20, padding: "14px 16px", background: "var(--black)", border: "1px solid var(--rule)", borderLeft: "3px solid var(--rule2)" }}>{tc.query}</div>
                  <div style={{ marginBottom: 16 }}>
                    <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "0.6rem", color: "var(--dim)", letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 8 }}>Expected Behavior</div>
                    <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "0.72rem", color: "var(--mid)", lineHeight: 1.7 }}>{tc.expectedBehavior}</div>
                  </div>
                  <div style={{ marginBottom: 20, padding: "12px 14px", background: "rgba(255,59,59,0.04)", border: "1px solid rgba(255,59,59,0.15)", borderLeft: "3px solid #ff3b3b" }}>
                    <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "0.6rem", color: "#ff3b3b", letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 6 }}>Failure Risk</div>
                    <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "0.7rem", color: "rgba(255,100,100,0.7)", lineHeight: 1.6 }}>{tc.failureRisk}</div>
                  </div>
                  <div style={{ marginBottom: 20 }}>
                    <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "0.6rem", color: "var(--dim)", letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 10 }}>Expected Scores</div>
                    <div style={{ display: "flex", gap: 4 }}>
                      {Object.entries(tc.expectedScores).map(([dim, s]) => (
                        <div key={dim} style={{ flex: 1, border: `1px solid ${scoreColor(s)}33`, padding: "8px", background: scoreBg(s) }}>
                          <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "0.55rem", color: "var(--dim)", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 4 }}>{DIM_LABELS[dim]}</div>
                          <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 22, color: scoreColor(s), letterSpacing: "0.04em" }}>{s}</div>
                        </div>
                      ))}
                    </div>
                    <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "0.68rem", color: "var(--dim)", marginTop: 10 }}>Expected weighted: <span style={{ color: "var(--mid)" }}>{calcExpected(tc.expectedScores)}</span></div>
                  </div>
                  <div>
                    <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "0.6rem", color: "var(--orange)", letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 12 }}>Score Actual Response</div>
                    {Object.keys(DIM_LABELS).map(dim => {
                      const cur = getActual(tc.id)[dim];
                      return (
                        <div key={dim} style={{ marginBottom: 12 }}>
                          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "0.65rem", color: "var(--mid)" }}>{DIM_LABELS[dim]} <span style={{ color: "var(--dim)" }}>({DIM_WEIGHTS[dim]}%)</span></div>
                            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "0.72rem", color: cur !== undefined ? scoreColor(cur) : "var(--dim)" }}>{cur !== undefined ? `${cur}/4` : "—"}</div>
                          </div>
                          <div style={{ display: "flex", gap: 4 }}>
                            {[0,1,2,3,4].map(v => (
                              <div key={v} className="score-pip" onClick={() => setActual(tc.id, dim, v)}
                                style={{ borderColor: cur === v ? scoreColor(v) : "var(--rule)", background: cur === v ? scoreBg(v) : "none", color: cur === v ? scoreColor(v) : "var(--dim)" }}>{v}</div>
                            ))}
                          </div>
                        </div>
                      );
                    })}
                    {actualWeighted(tc.id) !== null && (
                      <div style={{ marginTop: 16, padding: "14px 16px", border: `1px solid ${verdictColor(actualWeighted(tc.id))}33`, borderLeft: `3px solid ${verdictColor(actualWeighted(tc.id))}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "0.65rem", color: "var(--dim)", textTransform: "uppercase", letterSpacing: "0.08em" }}>Actual Weighted Score</div>
                        <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 36, letterSpacing: "0.04em", color: verdictColor(actualWeighted(tc.id)) }}>{actualWeighted(tc.id)}</div>
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>
          )}

          {view === "report" && (
            <div style={{ maxWidth: 820, margin: "0 auto", padding: "40px 24px" }}>
              <div style={{ borderBottom: "1px solid var(--rule)", paddingBottom: 24, marginBottom: 32 }}>
                <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 40, letterSpacing: "0.04em", color: "var(--white)", lineHeight: 1 }}>Evaluation Report</div>
                <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "0.68rem", color: "var(--dim)", marginTop: 8, lineHeight: 1.7 }}>
                  Regulated Compliance AI System · Burgess Evaluation Framework v1.0<br />
                  {new Date().toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" })}
                </div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 1, marginBottom: 32, background: "var(--rule)" }}>
                {[
                  { label: "Test Cases", value: "15" },
                  { label: "Scored", value: `${scoredCount}` },
                  { label: "Avg Score", value: avgActual ?? "—", color: avgActual ? verdictColor(avgActual) : "var(--dim)" },
                  { label: "Pass Rate", value: scoredCount > 0 ? `${Math.round(TEST_CASES.filter(t => (actualWeighted(t.id) || 0) >= 85).length / scoredCount * 100)}%` : "—" },
                ].map(s => (
                  <div key={s.label} style={{ background: "var(--black)", padding: "16px 20px" }}>
                    <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "0.6rem", color: "var(--dim)", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>{s.label}</div>
                    <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 32, letterSpacing: "0.04em", color: s.color || "var(--white)" }}>{s.value}</div>
                  </div>
                ))}
              </div>
              <div style={{ marginBottom: 32, padding: "20px", border: "1px solid rgba(232,98,26,0.2)", background: "rgba(232,98,26,0.04)", borderLeft: "3px solid var(--orange)" }}>
                <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "0.6rem", color: "var(--orange)", letterSpacing: "0.14em", textTransform: "uppercase", marginBottom: 10 }}>Methodology</div>
                <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "0.72rem", color: "var(--dim)", lineHeight: 1.8 }}>
                  The Burgess Evaluation Framework scores AI system outputs across five weighted dimensions: Factual Accuracy (30%), Scope Adherence (20%), Escalation Logic (20%), Output Quality (15%), and Retrieval Precision (15%). Weighted composite scores map to: <span style={{ color: "#4ec27a" }}>PASS ≥85</span> · <span style={{ color: "#f0c040" }}>REVIEW 65–84</span> · <span style={{ color: "#ff3b3b" }}>FAIL &lt;65</span>. Core principle: <em style={{ color: "var(--mid)" }}>fluent output is not correct output.</em>
                </div>
              </div>
              <div style={{ marginBottom: 32 }}>
                <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "0.6rem", color: "var(--orange)", letterSpacing: "0.14em", textTransform: "uppercase", marginBottom: 14 }}>Results</div>
                <div style={{ display: "grid", gridTemplateColumns: "60px 1fr 100px 64px 64px", gap: 10, padding: "6px 0", marginBottom: 6 }}>
                  {["ID", "Query", "Category", "Exp.", "Act."].map(h => (
                    <div key={h} style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "0.58rem", color: "var(--dim)", letterSpacing: "0.1em", textTransform: "uppercase" }}>{h}</div>
                  ))}
                </div>
                {TEST_CASES.map(t => {
                  const exp = calcExpected(t.expectedScores);
                  const act = actualWeighted(t.id);
                  const delta = act !== null ? act - exp : null;
                  return (
                    <div key={t.id} style={{ display: "grid", gridTemplateColumns: "60px 1fr 100px 64px 64px", gap: 10, padding: "10px 0", borderBottom: "1px solid var(--rule)", alignItems: "center" }}>
                      <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "0.65rem", color: "var(--dim)" }}>{t.id}</div>
                      <div style={{ fontSize: "0.78rem", color: "var(--mid)", lineHeight: 1.4 }}>{t.query.slice(0, 55)}…</div>
                      <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "0.6rem", color: "var(--dim)" }}>{t.category.split(" ")[0]}</div>
                      <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 18, color: "var(--dim)", letterSpacing: "0.04em" }}>{exp}</div>
                      <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                        <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 18, letterSpacing: "0.04em", color: act !== null ? verdictColor(act) : "rgba(255,255,255,0.15)" }}>{act ?? "—"}</div>
                        {delta !== null && <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "0.55rem", color: delta >= 0 ? "#4ec27a" : "#ff3b3b" }}>{delta > 0 ? "+" : ""}{delta}</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
              <div style={{ border: "1px solid var(--rule)", padding: "20px", background: "var(--ink)" }}>
                <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "0.6rem", color: "var(--orange)", letterSpacing: "0.14em", textTransform: "uppercase", marginBottom: 12 }}>Framework Notes</div>
                <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: "0.72rem", color: "var(--dim)", lineHeight: 1.8 }}>
                  Evaluation dimensions were derived from first-principles analysis of regulated compliance risk — prioritizing Accuracy and Escalation Logic as the highest-consequence failure modes. The test suite spans five categories designed to stress-test the full capability surface: routine lookup (baseline), policy interpretation (precision), edge cases (judgment), multi-step process (completeness), and out-of-scope traps (guardrails). Framework and test suite designed by Jay Burgess.
                </div>
              </div>
            </div>
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<BurgessTestSuite />);
  </script>
</body>
</html>
