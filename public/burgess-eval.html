<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BurgessEval · AI Evaluation Framework · Jay Burgess</title>
  <meta name="description" content="A weighted, rubric-driven scoring system for evaluating AI outputs in regulated environments. 5 dimensions. 7 failure pattern tags. Composite 0–100 score." />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0d; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-presets="react">
    const { useState } = React;

    const DIMENSIONS = [
      {
        id: "accuracy",
        label: "Factual Accuracy",
        description: "Is the output grounded in authoritative source documents? No hallucinated citations, invented figures, or fabricated policy statements.",
        weight: 30,
        rubric: [
          { score: 0, label: "Fail", desc: "Hallucinated fact, invented citation, or fabricated regulatory content" },
          { score: 1, label: "Poor", desc: "Partially correct but contains unverified or conflated information" },
          { score: 2, label: "Acceptable", desc: "Correct but relies on general knowledge rather than sourced document" },
          { score: 3, label: "Good", desc: "Correct and traceable to knowledge base source" },
          { score: 4, label: "Excellent", desc: "Correct, sourced, and precisely scoped to the applicable rule or policy" },
        ],
      },
      {
        id: "scope",
        label: "Scope Adherence",
        description: "Does the response stay within the defined domain boundary? No out-of-scope advice or boundary violations.",
        weight: 20,
        rubric: [
          { score: 0, label: "Fail", desc: "Answered out-of-scope question as if in scope" },
          { score: 1, label: "Poor", desc: "Partially in-scope but included out-of-scope material without flagging" },
          { score: 2, label: "Acceptable", desc: "Stayed in scope but missed opportunity to clarify boundary" },
          { score: 3, label: "Good", desc: "Correctly identified and honored scope boundary" },
          { score: 4, label: "Excellent", desc: "Identified boundary, explained it clearly, and redirected appropriately" },
        ],
      },
      {
        id: "escalation",
        label: "Escalation Logic",
        description: "Did the system correctly identify when to route to a human reviewer vs. answer autonomously?",
        weight: 20,
        rubric: [
          { score: 0, label: "Fail", desc: "Gave definitive answer on a case requiring human review" },
          { score: 1, label: "Poor", desc: "Escalated unnecessarily on a routine query (over-conservative)" },
          { score: 2, label: "Acceptable", desc: "Escalation decision was correct but poorly communicated" },
          { score: 3, label: "Good", desc: "Correct escalation decision with clear rationale" },
          { score: 4, label: "Excellent", desc: "Correct decision, clear rationale, and structured handoff context for reviewer" },
        ],
      },
      {
        id: "fluency",
        label: "Output Quality",
        description: "Is the response clear, appropriately scoped, and useful to a domain professional? Fluency is not correctness.",
        weight: 15,
        rubric: [
          { score: 0, label: "Fail", desc: "Incoherent, contradictory, or unusable" },
          { score: 1, label: "Poor", desc: "Technically present but confusing or poorly structured" },
          { score: 2, label: "Acceptable", desc: "Clear but generic — lacks precision or actionable specificity" },
          { score: 3, label: "Good", desc: "Clear, well-structured, and actionable" },
          { score: 4, label: "Excellent", desc: "Precise, well-scoped, professional tone appropriate for compliance context" },
        ],
      },
      {
        id: "retrieval",
        label: "Retrieval Precision",
        description: "Did the RAG layer surface the correct documents? Were irrelevant chunks excluded from context?",
        weight: 15,
        rubric: [
          { score: 0, label: "Fail", desc: "Wrong documents retrieved; answer contaminated by irrelevant context" },
          { score: 1, label: "Poor", desc: "Partially relevant retrieval; answer partially grounded" },
          { score: 2, label: "Acceptable", desc: "Relevant documents retrieved but ranked suboptimally" },
          { score: 3, label: "Good", desc: "Correct documents retrieved and prioritized appropriately" },
          { score: 4, label: "Excellent", desc: "Exact right documents, correct ranking, no noise in context window" },
        ],
      },
    ];

    const QUERY_TYPES = ["Routine Lookup", "Policy Interpretation", "Edge Case / Exception", "Multi-Step Process", "Out-of-Scope Test"];
    const FAILURE_TAGS = ["hallucination", "scope-breach", "missed-escalation", "retrieval-miss", "spec-drift", "silent-failure", "over-escalation"];

    const scoreColor = (s) => {
      if (s === null || s === undefined) return "#2a2a2a";
      return ["#ff3b3b","#ff7a2f","#f0c040","#4ec27a","#00d4aa"][s];
    };
    const scoreBg = (s) => {
      if (s === null || s === undefined) return "transparent";
      return ["rgba(255,59,59,0.08)","rgba(255,122,47,0.08)","rgba(240,192,64,0.08)","rgba(78,194,122,0.08)","rgba(0,212,170,0.08)"][s];
    };

    const calcWeighted = (scores) => {
      let total = 0, max = 0;
      for (const d of DIMENSIONS) {
        if (scores[d.id] !== null && scores[d.id] !== undefined) {
          total += scores[d.id] * d.weight; max += 4 * d.weight;
        }
      }
      return max === 0 ? null : Math.round((total / max) * 100);
    };

    const getVerdict = (pct) => {
      if (pct === null) return null;
      if (pct >= 85) return { label: "PASS", color: "#00d4aa" };
      if (pct >= 65) return { label: "REVIEW", color: "#f0c040" };
      return { label: "FAIL", color: "#ff3b3b" };
    };

    const emptyEval = () => ({
      id: Date.now(), queryText: "", queryType: "", responseText: "",
      scores: { accuracy: null, scope: null, escalation: null, fluency: null, retrieval: null },
      failureTags: [], notes: "", timestamp: new Date().toISOString(),
    });

    const DIM_LABELS = { accuracy: "Accuracy", scope: "Scope", escalation: "Escalation", fluency: "Output", retrieval: "Retrieval" };

    function BurgessEvalFramework() {
      const [evals, setEvals] = useState([]);
      const [current, setCurrent] = useState(emptyEval());
      const [view, setView] = useState("eval");
      const [activeDim, setActiveDim] = useState(null);

      const setScore = (dimId, score) => setCurrent(c => ({ ...c, scores: { ...c.scores, [dimId]: score } }));
      const toggleTag = (tag) => setCurrent(c => ({
        ...c, failureTags: c.failureTags.includes(tag) ? c.failureTags.filter(t => t !== tag) : [...c.failureTags, tag]
      }));

      const submitEval = () => {
        if (!current.queryText.trim()) return;
        const pct = calcWeighted(current.scores);
        setEvals(prev => [{ ...current, weightedScore: pct }, ...prev]);
        setCurrent(emptyEval()); setActiveDim(null);
      };

      const weighted = calcWeighted(current.scores);
      const verdict = getVerdict(weighted);
      const avgScore = evals.length ? Math.round(evals.filter(e => e.weightedScore !== null).reduce((a, b) => a + b.weightedScore, 0) / evals.filter(e => e.weightedScore !== null).length) : null;
      const failCounts = {};
      for (const e of evals) for (const t of e.failureTags) failCounts[t] = (failCounts[t] || 0) + 1;
      const topFailure = Object.entries(failCounts).sort((a, b) => b[1] - a[1])[0];

      return (
        <div style={{ minHeight: "100vh", background: "#0d0d0d", fontFamily: "'DM Mono', 'Courier New', monospace", color: "#e8e8e0" }}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap');
            * { box-sizing: border-box; }
            ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
            .nav-btn { background: none; border: none; cursor: pointer; font-family: inherit; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; padding: 8px 16px; transition: all 0.15s; border-bottom: 2px solid transparent; }
            .nav-btn.active { background: #1a1a1a; color: #00d4aa; border-bottom-color: #00d4aa; }
            .nav-btn:not(.active) { color: #555; }
            .score-btn { border: 1px solid #2a2a2a; background: none; cursor: pointer; font-family: inherit; font-size: 10px; padding: 8px 10px; transition: all 0.15s; border-radius: 2px; text-align: left; flex: 1 1 140px; }
            .tag-btn { border: 1px solid #2a2a2a; background: none; cursor: pointer; font-family: inherit; font-size: 10px; padding: 4px 10px; border-radius: 20px; transition: all 0.15s; color: #666; letter-spacing: 0.05em; }
            .tag-btn.active { border-color: #ff3b3b; color: #ff3b3b; background: rgba(255,59,59,0.06); }
            .tag-btn:hover:not(.active) { border-color: #444; color: #aaa; }
            .submit-btn { background: #00d4aa; color: #000; border: none; cursor: pointer; font-family: inherit; font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; padding: 12px 28px; transition: all 0.2s; }
            .submit-btn:hover { background: #00f0c0; transform: translateY(-1px); }
            .submit-btn:disabled { background: #1a1a1a; color: #333; cursor: not-allowed; transform: none; }
            .dim-row { border: 1px solid #1e1e1e; padding: 16px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; }
            .dim-row:hover, .dim-row.expanded { border-color: #2a2a2a; background: #111; }
            textarea, input, select { background: #111; border: 1px solid #222; color: #e8e8e0; font-family: 'DM Mono', monospace; font-size: 12px; padding: 10px 12px; width: 100%; outline: none; resize: vertical; }
            textarea:focus, input:focus, select:focus { border-color: #00d4aa; }
            select option { background: #111; }
            .eval-card { border: 1px solid #1e1e1e; padding: 14px 16px; margin-bottom: 8px; }
            .back-link { font-family: 'DM Mono', monospace; font-size: 10px; color: #444; text-decoration: none; letter-spacing: 0.1em; transition: color 0.15s; }
            .back-link:hover { color: #aaa; }
          `}</style>

          <div style={{ borderBottom: "1px solid #1a1a1a", padding: "20px 32px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div>
              <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 4 }}>
                <a href="/" className="back-link">← jayburgess.netlify.app</a>
              </div>
              <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 22, fontWeight: 800, letterSpacing: "-0.02em", color: "#fff" }}>
                BURGESS<span style={{ color: "#00d4aa" }}>EVAL</span>
              </div>
              <div style={{ fontSize: 10, color: "#444", letterSpacing: "0.15em", marginTop: 2 }}>
                AI SYSTEM EVALUATION FRAMEWORK · REGULATED COMPLIANCE DOMAIN
              </div>
            </div>
            <div style={{ display: "flex", gap: 20, alignItems: "center" }}>
              {avgScore !== null && (
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 10, color: "#444", letterSpacing: "0.1em" }}>AVG SCORE</div>
                  <div style={{ fontFamily: "'Syne'", fontSize: 24, fontWeight: 800, color: getVerdict(avgScore)?.color }}>{avgScore}</div>
                </div>
              )}
              <div style={{ fontSize: 10, color: "#333", letterSpacing: "0.1em" }}>{evals.length} EVAL{evals.length !== 1 ? "S" : ""} LOGGED</div>
            </div>
          </div>

          <div style={{ borderBottom: "1px solid #1a1a1a", display: "flex" }}>
            {["eval", "log", "rubric"].map(v => (
              <button key={v} className={`nav-btn ${view === v ? "active" : ""}`} onClick={() => setView(v)}>
                {v === "eval" ? "Run Evaluation" : v === "log" ? `Score Log (${evals.length})` : "Rubric Reference"}
              </button>
            ))}
          </div>

          <div style={{ maxWidth: 860, margin: "0 auto", padding: "28px 24px" }}>

            {view === "eval" && (
              <div>
                <div style={{ marginBottom: 24 }}>
                  <div style={{ fontSize: 10, color: "#00d4aa", letterSpacing: "0.15em", marginBottom: 8 }}>01 · QUERY INPUT</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 220px", gap: 8, marginBottom: 8 }}>
                    <textarea rows={3} placeholder="Paste the query or test case prompt here..." value={current.queryText} onChange={e => setCurrent(c => ({ ...c, queryText: e.target.value }))} />
                    <select value={current.queryType} onChange={e => setCurrent(c => ({ ...c, queryType: e.target.value }))} style={{ height: "100%" }}>
                      <option value="">Query Type...</option>
                      {QUERY_TYPES.map(t => <option key={t}>{t}</option>)}
                    </select>
                  </div>
                  <textarea rows={3} placeholder="Paste the AI system response to evaluate..." value={current.responseText} onChange={e => setCurrent(c => ({ ...c, responseText: e.target.value }))} />
                </div>

                <div style={{ marginBottom: 24 }}>
                  <div style={{ fontSize: 10, color: "#00d4aa", letterSpacing: "0.15em", marginBottom: 8 }}>02 · DIMENSION SCORING</div>
                  {DIMENSIONS.map(dim => {
                    const s = current.scores[dim.id];
                    const isOpen = activeDim === dim.id;
                    return (
                      <div key={dim.id} className={`dim-row ${isOpen ? "expanded" : ""}`} onClick={() => setActiveDim(isOpen ? null : dim.id)} style={{ background: s !== null ? scoreBg(s) : undefined }}>
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                            <div style={{ fontSize: 10, color: "#444", width: 20 }}>{DIMENSIONS.indexOf(dim) + 1}</div>
                            <div>
                              <div style={{ fontSize: 12, color: s !== null ? scoreColor(s) : "#e8e8e0" }}>{dim.label}</div>
                              <div style={{ fontSize: 10, color: "#444", marginTop: 2 }}>weight: {dim.weight}%</div>
                            </div>
                          </div>
                          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                            {s !== null && <div style={{ fontSize: 11, color: scoreColor(s), background: scoreBg(s), border: `1px solid ${scoreColor(s)}33`, padding: "2px 8px", borderRadius: 2 }}>{dim.rubric[s].label} · {s}/4</div>}
                            <div style={{ fontSize: 10, color: "#333" }}>{isOpen ? "▲" : "▼"}</div>
                          </div>
                        </div>
                        {isOpen && (
                          <div style={{ marginTop: 14, paddingTop: 14, borderTop: "1px solid #1e1e1e" }} onClick={e => e.stopPropagation()}>
                            <div style={{ fontSize: 10, color: "#555", marginBottom: 10 }}>{dim.description}</div>
                            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                              {dim.rubric.map(r => (
                                <button key={r.score} className="score-btn" onClick={() => setScore(dim.id, r.score)}
                                  style={{ borderColor: s === r.score ? scoreColor(r.score) : "#2a2a2a", color: s === r.score ? scoreColor(r.score) : "#555", background: s === r.score ? scoreBg(r.score) : "none" }}>
                                  <div style={{ fontSize: 11, marginBottom: 3 }}>{r.score} — {r.label}</div>
                                  <div style={{ fontSize: 10, color: s === r.score ? scoreColor(r.score) : "#444", lineHeight: 1.4 }}>{r.desc}</div>
                                </button>
                              ))}
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>

                <div style={{ marginBottom: 24 }}>
                  <div style={{ fontSize: 10, color: "#00d4aa", letterSpacing: "0.15em", marginBottom: 8 }}>03 · FAILURE PATTERN TAGS</div>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {FAILURE_TAGS.map(tag => (
                      <button key={tag} className={`tag-btn ${current.failureTags.includes(tag) ? "active" : ""}`} onClick={() => toggleTag(tag)}>{tag}</button>
                    ))}
                  </div>
                </div>

                <div style={{ marginBottom: 24 }}>
                  <div style={{ fontSize: 10, color: "#00d4aa", letterSpacing: "0.15em", marginBottom: 8 }}>04 · EVALUATOR NOTES</div>
                  <textarea rows={2} placeholder="Optional: root cause, context, recommended fix..." value={current.notes} onChange={e => setCurrent(c => ({ ...c, notes: e.target.value }))} />
                </div>

                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", borderTop: "1px solid #1a1a1a", paddingTop: 20 }}>
                  <div>
                    {weighted !== null ? (
                      <div style={{ display: "flex", alignItems: "baseline", gap: 12 }}>
                        <div style={{ fontFamily: "'Syne'", fontSize: 40, fontWeight: 800, color: verdict?.color, lineHeight: 1 }}>{weighted}</div>
                        <div>
                          <div style={{ fontSize: 10, letterSpacing: "0.15em", color: verdict?.color }}>{verdict?.label}</div>
                          <div style={{ fontSize: 10, color: "#444" }}>weighted score</div>
                        </div>
                      </div>
                    ) : <div style={{ fontSize: 11, color: "#333" }}>Score dimensions to see weighted result</div>}
                  </div>
                  <button className="submit-btn" onClick={submitEval} disabled={!current.queryText.trim()}>Log Evaluation →</button>
                </div>
              </div>
            )}

            {view === "log" && (
              <div>
                {evals.length === 0 ? (
                  <div style={{ color: "#333", fontSize: 12, textAlign: "center", padding: "60px 0" }}>No evaluations logged yet.</div>
                ) : (
                  <>
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 8, marginBottom: 24 }}>
                      {[
                        { label: "Total Evals", value: evals.length },
                        { label: "Avg Score", value: avgScore ?? "—", color: avgScore ? getVerdict(avgScore)?.color : "#444" },
                        { label: "Top Failure", value: topFailure ? `${topFailure[0]} (${topFailure[1]}x)` : "none", color: topFailure ? "#ff3b3b" : "#444" },
                      ].map(s => (
                        <div key={s.label} style={{ border: "1px solid #1e1e1e", padding: "12px 16px" }}>
                          <div style={{ fontSize: 10, color: "#444", letterSpacing: "0.1em", marginBottom: 4 }}>{s.label}</div>
                          <div style={{ fontSize: 18, color: s.color || "#e8e8e0" }}>{s.value}</div>
                        </div>
                      ))}
                    </div>
                    {evals.map(e => {
                      const v = getVerdict(e.weightedScore);
                      return (
                        <div key={e.id} className="eval-card">
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                            <div style={{ fontSize: 11, color: "#aaa", flex: 1, marginRight: 16, lineHeight: 1.5 }}>{e.queryText.slice(0, 120)}{e.queryText.length > 120 ? "…" : ""}</div>
                            <div style={{ display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
                              {e.queryType && <div style={{ fontSize: 10, color: "#444" }}>{e.queryType}</div>}
                              {e.weightedScore !== null && <div style={{ fontSize: 20, fontFamily: "'Syne'", fontWeight: 800, color: v?.color }}>{e.weightedScore}</div>}
                              {v && <div style={{ fontSize: 10, border: `1px solid ${v.color}`, color: v.color, padding: "2px 6px" }}>{v.label}</div>}
                            </div>
                          </div>
                          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                            {DIMENSIONS.map(d => {
                              const s = e.scores[d.id];
                              return s !== null ? <div key={d.id} style={{ fontSize: 10, color: scoreColor(s), background: scoreBg(s), padding: "2px 7px", borderRadius: 2 }}>{DIM_LABELS[d.id]}: {s}/4</div> : null;
                            })}
                            {e.failureTags.map(t => <div key={t} style={{ fontSize: 10, color: "#ff3b3b", border: "1px solid #ff3b3b33", padding: "2px 7px", borderRadius: 10 }}>{t}</div>)}
                          </div>
                          {e.notes && <div style={{ fontSize: 10, color: "#555", marginTop: 8, fontStyle: "italic" }}>{e.notes}</div>}
                        </div>
                      );
                    })}
                  </>
                )}
              </div>
            )}

            {view === "rubric" && (
              <div>
                <div style={{ fontSize: 10, color: "#444", letterSpacing: "0.1em", marginBottom: 20, lineHeight: 1.6 }}>
                  SCORING GUIDE · 0–4 per dimension · weighted composite → 0–100<br />
                  PASS ≥85 · REVIEW 65–84 · FAIL &lt;65 · Escalation and Accuracy carry highest weight
                </div>
                {DIMENSIONS.map(dim => (
                  <div key={dim.id} style={{ border: "1px solid #1e1e1e", padding: "16px", marginBottom: 12 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                      <div style={{ fontSize: 13, color: "#e8e8e0" }}>{dim.label}</div>
                      <div style={{ fontSize: 10, color: "#00d4aa" }}>weight: {dim.weight}%</div>
                    </div>
                    <div style={{ fontSize: 11, color: "#555", marginBottom: 12 }}>{dim.description}</div>
                    {dim.rubric.map(r => (
                      <div key={r.score} style={{ display: "flex", gap: 10, marginBottom: 6, alignItems: "flex-start" }}>
                        <div style={{ width: 18, height: 18, background: scoreBg(r.score), border: `1px solid ${scoreColor(r.score)}44`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, color: scoreColor(r.score), flexShrink: 0 }}>{r.score}</div>
                        <div style={{ fontSize: 11, color: "#666", lineHeight: 1.5 }}><span style={{ color: scoreColor(r.score) }}>{r.label}</span> — {r.desc}</div>
                      </div>
                    ))}
                  </div>
                ))}
                <div style={{ border: "1px solid #1e1e1e", padding: "16px", marginTop: 20 }}>
                  <div style={{ fontSize: 12, color: "#e8e8e0", marginBottom: 10 }}>Failure Pattern Taxonomy</div>
                  {[
                    ["hallucination", "Output contains invented facts, citations, or regulatory text"],
                    ["scope-breach", "System answered a question outside the defined domain"],
                    ["missed-escalation", "Should have routed to human reviewer; answered definitively instead"],
                    ["retrieval-miss", "RAG layer surfaced wrong or irrelevant documents"],
                    ["spec-drift", "Response deviated from defined system prompt behavior"],
                    ["silent-failure", "Output appeared correct but contained a substantive error"],
                    ["over-escalation", "Escalated a routine query unnecessarily"],
                  ].map(([tag, desc]) => (
                    <div key={tag} style={{ display: "flex", gap: 10, marginBottom: 6, alignItems: "flex-start" }}>
                      <div style={{ fontSize: 10, color: "#ff3b3b", border: "1px solid #ff3b3b33", padding: "1px 7px", borderRadius: 10, flexShrink: 0 }}>{tag}</div>
                      <div style={{ fontSize: 10, color: "#444" }}>{desc}</div>
                    </div>
                  ))}
                </div>
                <div style={{ marginTop: 24, padding: "16px", border: "1px solid #00d4aa22", background: "rgba(0,212,170,0.03)" }}>
                  <div style={{ fontSize: 10, color: "#00d4aa", letterSpacing: "0.12em", marginBottom: 8 }}>FRAMEWORK AUTHOR</div>
                  <div style={{ fontSize: 11, color: "#555", lineHeight: 1.7 }}>
                    The Burgess Evaluation Framework was designed by Jay Burgess as part of a production AI system quality assurance process for regulated compliance environments. Dimension weights reflect the risk profile of high-stakes AI deployments where the cost of an incorrect output exceeds the cost of over-escalation. Framework distinguishes <em style={{ color: "#888" }}>fluent output</em> from <em style={{ color: "#888" }}>correct output</em> — the central failure mode in AI systems operating in compliance-sensitive domains.
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<BurgessEvalFramework />);
  </script>
</body>
</html>
